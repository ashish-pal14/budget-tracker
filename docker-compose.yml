version: "3.8"

services:
  budget-app:
    build: .
    container_name: budget-tracker-container
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
    volumes:
      - data-volume:/app
    restart: unless-stopped
    networks:
      - app-network

volumes:
  data-volume:

networks:
  app-network:
