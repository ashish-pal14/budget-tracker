name: CD - Deploy to AWS

on:
  workflow_run:
    workflows: ["CI - Build & Push Docker Image"]   # must match CI name exactly
    types:
      - completed

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AWS_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.AWS_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to EC2
        run: |
          ssh ${{ secrets.AWS_USER }}@${{ secrets.AWS_HOST }} << 'EOF'

          cd /opt/budget-tracker

          docker pull ${{ secrets.DOCKER_USERNAME }}/budget-app:latest

          docker compose down
          docker compose up -d

          EOF
