name: Deploy Budget Tracker to AWS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AWS_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.AWS_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to EC2
        run: |
          ssh ${{ secrets.AWS_USER }}@${{ secrets.AWS_HOST }} << 'EOF'

          # Create dir if not exists
          mkdir -p /opt/budget-tracker
          cd /opt/budget-tracker

          # Clone or pull repo
          if [ ! -d ".git" ]; then
            git clone https://github.com/ashish-pal14/budget-tracker.git .
          else
            git pull origin main
          fi

          # Stop old container
          docker-compose down

          # Build and run new container
          docker-compose up -d --build

          EOF
